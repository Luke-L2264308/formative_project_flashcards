<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header"></div>
    <script src="header.js"></script>
    <h1>Your Sets.</h1>
    <p id="status">Loading cards...</p>
    <ul id="cardsList"></ul>

    <script>
        async function loadCards() {
            const status = document.getElementById("status");
            const cardsList = document.getElementById("cardsList");

            try {
                const [cardsResponse, setsResponse] = await Promise.all([
                    fetch("http://localhost:3000/api/cards"),
                    fetch("http://localhost:3000/api/sets")
                ]);

                if (!cardsResponse.ok || !setsResponse.ok) {
                    throw new Error("Request failed");
                }

                const [cards, sets] = await Promise.all([
                    cardsResponse.json(),
                    setsResponse.json()
                ]);

                const setNamesById = new Map(
                    sets.map((set) => [set.id, set.title])
                );

                if (cards.length === 0) {
                    status.textContent = "No cards found in the database.";
                    return;
                }

                status.textContent = "Cards loaded from MySQL:";

                cards.forEach((card) => {
                    const item = document.createElement("li");
                    const setName = setNamesById.get(card.set_id) || `Set ${card.set_id}`;
                    item.textContent = `[${setName}] Q: ${card.question} | A: ${card.answer}`;
                    cardsList.appendChild(item);
                });
            } catch (error) {
                status.textContent = "Could not load cards. Is the API running on port 3000?";
            }
        }

        loadCards();
    </script>
</body>
</html>
