<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header"></div>
    <script src="header.js"></script>
    <h1>Your Sets.</h1>
    <p id="status">Loading cards...</p>
    <ul id="cardsList"></ul>

    <script>
        async function loadCards() {
            const status = document.getElementById("status");
            const cardsList = document.getElementById("cardsList");

            try {
                const setsResponse = await fetch("http://localhost:3000/api/sets")
                

                if (!setsResponse.ok) {
                    throw new Error("Request failed");
                }

                const sets = await setsResponse.json();

                

                const setNamesById = new Map(
                    sets.map((set) => [set.id, set.title])
                );

                if (sets.length === 0) {
                    status.textContent = "No sets found in the database.";
                    return;
                }

                status.textContent = "Sets loaded from MySQL:";

                sets.forEach((set) => {
                    const item = document.createElement("button");
                    item.addEventListener("click", () => {
                        window.location.href = `flashcard.html?setId=${set.id}`;
                    });
                    const setName = setNamesById.get(set.id) || `Set ${set.id}`;
                    item.textContent = setName;
                    cardsList.appendChild(item);
                });
            } catch (error) {
                status.textContent = "Could not load sets. Is the API running on port 3000?";
            }
        }

        loadCards();
    </script>
</body>
</html>
