<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Sets</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="create-sets.js"></script>
</head>

<body>

    <div id="header"></div>
    <script src="header.js"></script>

    <div class="container">
        <h1>Edit Sets</h1>
        <input type="text" id="set-name" placeholder="Enter set name">

    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get("setId");
        async function init() {
            if (setId) {
                document.getElementById("set-name").disabled = true;
                await loadSet(setId);
            }
        }
        async function loadSet(setId) {
            try {
                alert(setId);
                const response = await fetch(`/api/sets/${setId}/cards`, {
                    method: "GET",
                });
                const titleResponse = await fetch(`/api/sets/${setId}`, {
                    method: "GET",
                });
                if (response.ok) {
                    const setData = await response.json();
                    alert(JSON.stringify(setData, null, 2));
                    const titleData = await titleResponse.json();
                    alert(JSON.stringify(titleData, null, 2));
                    document.getElementById("set-name").value = titleData.title;
                    setData.forEach(flashcard => {
                        addFlashcard(flashcard.question, flashcard.answer);
                    });
                } else {
                    alert(response.statusText);
                }
            } catch (error) {
                alert(error.message);
            }
        }
        init();

    </script>
    <div class="buttons">
        <button id="addflashcard" onclick="addFlashcard()">add a flashcard</button>
        <button id="save-set" onclick="saveSet()"> save set</button>


    </div>
    
    <div id="sets-container"></div>
